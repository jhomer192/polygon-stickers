<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d12" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Stickers" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  <link rel="stylesheet" href="style.css" />
  <title>Sticker Maker</title>
</head>
<body>
  <main id="app">
    <header class="topbar">
      <div class="brand">✂︎ Stickers</div>
      <a class="help" href="install.html" aria-label="How to install">Install</a>
    </header>

    <section class="stage" aria-label="Sticker preview">
      <div class="canvas-wrap has-photo">
        <canvas id="photo-canvas" width="1024" height="1024" aria-label="Sticker canvas"></canvas>
      </div>
    </section>

    <section class="controls" aria-label="Controls">
      <div class="row">
        <label class="btn-file action secondary">
          <input id="photo-file" type="file" accept="image/*" hidden />
          <span id="photo-file-label">Choose photo</span>
        </label>
        <p class="hint">Pick any image — photo, screenshot, meme. Then tap the background to erase it.</p>
      </div>

      <div class="row" id="photo-tools" hidden>
        <div class="seg" role="tablist" aria-label="Tool">
          <button class="seg-btn active" data-tool="wand" role="tab" aria-selected="true">Magic wand</button>
          <button class="seg-btn" data-tool="erase" role="tab" aria-selected="false">Eraser</button>
          <button class="seg-btn" data-tool="restore" role="tab" aria-selected="false">Restore</button>
        </div>
      </div>

      <div class="row" id="photo-tolerance-row" hidden>
        <label class="lbl"><span>Wand tolerance</span><output id="tol-out">28</output></label>
        <input id="photo-tolerance" type="range" min="0" max="120" value="28" step="1" />
        <p class="hint">Higher = grabs more similar pixels per tap. Flat backgrounds: low. Photos: high.</p>
      </div>

      <div class="row" id="photo-brush-row" hidden>
        <label class="lbl"><span>Brush size</span><output id="brush-out">40px</output></label>
        <input id="photo-brush" type="range" min="6" max="120" value="40" step="2" />
      </div>

      <div class="row" id="photo-actions" hidden>
        <div class="snaps">
          <button class="snap" id="photo-undo">Undo</button>
          <button class="snap" id="photo-reset">Reset</button>
          <button class="snap" id="photo-crop">Crop to subject</button>
          <button class="snap" id="photo-auto">Auto-remove bg</button>
        </div>
        <p class="hint" id="photo-auto-hint">Auto-remove downloads a ~30 MB on-device model the first time you tap it. Runs entirely on your phone after that.</p>
      </div>
    </section>

    <footer class="actions">
      <button id="btn-copy" class="action secondary">Copy</button>
      <button id="btn-share" class="action primary">Save / Share</button>
    </footer>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </main>

  <script src="app.js" type="module"></script>
</body>
</html>
